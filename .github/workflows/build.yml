name: Java CI - Build JAR

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Build JAR
        run: scripts/build_jar.cmd
        shell: cmd
        
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: MolChemView
          path: build/*.jar
